# ngrok.yml — persistent tunnel definitions for frontend and backend
# If needed, add your ngrok auth token here or use the global CLI auth.
# authtoken: YOUR_NGROK_AUTH_TOKEN

version: "2"
web_addr: 127.0.0.1:4040

# Named tunnels are easier to manage and parse from the ngrok API.
tunnels:
  frontend:
    proto: http
    addr: 5173
    inspect: true
  backend:
    proto: http
    addr: 7899
    inspect: true
