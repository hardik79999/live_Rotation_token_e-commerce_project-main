<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>ShopHub — India's Fastest Growing Marketplace</title>
    <meta name="description" content="Shop millions of products from verified sellers. Fast delivery, easy returns, best prices." />
    <meta name="theme-color" content="#0f172a" />

    <!-- ── PWA / manifest ── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- ── iOS PWA meta ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShopHub" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ShopHub — India's Fastest Growing Marketplace" />
    <meta property="og:description" content="Shop millions of products from verified sellers." />
    <meta property="og:image"       content="/pwa-512x512.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
